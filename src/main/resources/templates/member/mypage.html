<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>마이페이지</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, "Malgun Gothic", sans-serif;
            background: #f8fafc;
            color: #1f2937;
        }
        .site-nav {
            position: fixed;
            top: 28px;
            left: 36px;
            display: flex;
            gap: 28px;
            z-index: 10;
            font-size: 15px;
            font-weight: 700;
        }
        .site-nav a { color: #26324a; text-decoration: none; }
        .hero {
            padding: 28px 24px 24px;
            text-align: center;
            background: #ffffff;
            border-bottom: 1px solid #dde4ee;
        }
        .brand-logo {
            margin: 0;
            color: #26324a;
            font-size: 64px;
            font-weight: 900;
            letter-spacing: 0;
        }
        .brand-subtitle {
            margin: 12px 0 0;
            color: #5c667a;
            font-size: 24px;
            font-weight: 700;
        }
        .mypage-layout {
            display: grid;
            grid-template-columns: 280px minmax(0, 1fr);
            gap: 44px;
            max-width: 1180px;
            margin: 36px auto 80px;
            padding: 0 32px;
        }
        .side-card,
        .purchase-panel {
            background: #ffffff;
            border: 1px solid #dde4ee;
            border-radius: 8px;
            box-shadow: 0 10px 22px rgba(38, 50, 74, 0.06);
        }
        .side-card {
            min-height: 430px;
            padding: 38px 28px;
        }
        .nickname {
            margin: 0 0 32px;
            font-size: 24px;
            font-weight: 800;
        }
        .side-button {
            display: block;
            width: 100%;
            height: 46px;
            margin-top: 12px;
            border-radius: 6px;
            background: #edf0ff;
            color: #1f3a8a;
            font-size: 15px;
            font-weight: 800;
            line-height: 46px;
            text-align: center;
            text-decoration: none;
        }
        .logout-button { background: #f1f5f9; color: #475569; }
        .withdraw-button { background: #fff1f2; color: #be123c; }
        .main-title {
            margin: 58px 0 26px 16px;
            font-size: 26px;
            font-weight: 800;
        }
        .purchase-panel {
            min-height: 320px;
            padding: 34px 30px;
        }
        .purchase-content {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 210px;
            gap: 28px;
            align-items: center;
        }
        .book-list {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 22px;
        }
        .book-card {
            min-height: 220px;
            padding: 14px;
            border: 1px solid #dde4ee;
            border-radius: 8px;
            text-align: center;
        }
        .book-cover {
            width: 100%;
            height: 140px;
            margin-bottom: 14px;
            object-fit: contain;
            background: #f8fafc;
        }
        .book-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 140px;
            margin-bottom: 14px;
            background: #eef2f7;
            color: #64748b;
            font-weight: 700;
        }
        .book-title {
            margin: 0;
            font-size: 16px;
            font-weight: 800;
            line-height: 1.35;
        }
        .book-meta {
            margin: 8px 0 0;
            color: #5c667a;
            font-size: 13px;
            font-weight: 700;
        }
        .panel-note {
            padding-left: 28px;
            border-left: 1px solid #dde4ee;
            color: #1f2937;
            font-size: 16px;
            line-height: 1.7;
        }
        .more-button {
            display: inline-block;
            margin-top: 28px;
            color: #1f3a8a;
            font-size: 17px;
            font-weight: 800;
            text-decoration: none;
        }
        .empty-message {
            padding: 48px 20px;
            color: #5c667a;
            font-size: 18px;
            font-weight: 800;
            text-align: center;
        }
        @media (max-width: 900px) {
            .brand-logo { font-size: 48px; }
            .mypage-layout,
            .purchase-content { grid-template-columns: 1fr; }
            .main-title { margin-top: 8px; }
            .book-list { grid-template-columns: 1fr; }
            .panel-note { padding-left: 0; border-left: 0; }
        }
    </style>
</head>
<body>
    <nav class="site-nav">
        <a th:href="@{/}">홈</a>
        <a th:if="${loginUserId == null}" th:href="@{/member/id-input}">로그인</a>
        <a th:if="${loginUserId != null}" th:href="@{/member/logout}">로그아웃</a>
    </nav>

    <header class="hero">
        <h1 class="brand-logo">BookFrame</h1>
        <p class="brand-subtitle">도서 구매 사이트</p>
    </header>

    <main class="mypage-layout">
        <aside class="side-card" th:if="${member}">
            <p class="nickname" th:text="${member.name != null ? member.name + '님' : member.userId + '님'}">닉네임님</p>
            <a class="side-button" th:href="@{/member/mypage/edit}">정보수정</a>
            <a class="side-button" th:href="@{/member/cart}">장바구니</a>
            <a class="side-button logout-button" th:href="@{/member/logout}">로그아웃</a>
            <a class="side-button withdraw-button" th:href="@{/member/withdraw}">회원탈퇴</a>
        </aside>

        <section th:if="${member}">
            <h2 class="main-title">구매 내역</h2>
            <div class="purchase-panel">
                <div class="empty-message" th:if="${#lists.isEmpty(recentPurchases)}">
                    구매 내역이 없습니다.
                </div>

                <div class="purchase-content" th:unless="${#lists.isEmpty(recentPurchases)}">
                    <div class="book-list">
                        <article class="book-card" th:each="purchase : ${recentPurchases}">
                            <img class="book-cover"
                                 th:if="${purchase.imageUrl != null and purchase.imageUrl != ''}"
                                 th:src="${purchase.imageUrl}"
                                 th:alt="${purchase.bookName}">
                            <div class="book-placeholder" th:unless="${purchase.imageUrl != null and purchase.imageUrl != ''}">
                                No Image
                            </div>
                            <p class="book-title" th:text="${purchase.bookName}">책 제목</p>
                            <p class="book-meta" th:text="${#numbers.formatDecimal(purchase.unitPrice, 0, 'COMMA', 0, 'POINT')} + '원'">0원</p>
                        </article>
                    </div>

                    <div class="panel-note">
                        <p>최근 구매한 책을 확인할 수 있습니다.</p>
                        <a class="more-button" th:if="${hasMorePurchases}" th:href="@{/member/purchases}">더보기 ›</a>
                    </div>
                </div>
            </div>
        </section>

        <section class="side-card" th:unless="${member}">
            <p class="nickname">회원 정보를 찾을 수 없습니다.</p>
            <a class="side-button" th:href="@{/member/id-input}">로그인</a>
        </section>
    </main>
</body>
</html>
