<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>마이페이지</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, "Malgun Gothic", sans-serif;
            background: #f5f7fb;
            color: #1f2937;
        }

        .auth-page {
            display: grid;
            grid-template-columns: 1fr 430px;
            min-height: 100vh;
        }

        .brand-area {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px;
            text-align: center;
            background: #ffffff;
        }

        .brand-logo {
            margin: 0;
            font-size: 72px;
            font-weight: 800;
            letter-spacing: 0;
            color: #26324a;
        }

        .brand-subtitle {
            margin: 12px 0 0;
            font-size: 24px;
            font-weight: 600;
            color: #5c667a;
        }

        .content-area {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: #eef2f7;
            border-left: 1px solid #dde4ee;
        }

        .content-panel {
            width: 100%;
            max-width: 340px;
        }

        h1 {
            margin: 0 0 24px;
            font-size: 28px;
            color: #111827;
        }

        .profile-box {
            padding: 24px;
            background: #ffffff;
            border: 1px solid #dde4ee;
            border-radius: 8px;
        }

        .profile-box p {
            margin: 0 0 14px;
            font-size: 16px;
            font-weight: 700;
        }

        .button-link {
            display: block;
            width: 100%;
            height: 46px;
            margin-top: 12px;
            border-radius: 6px;
            background: #26324a;
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            line-height: 46px;
            text-align: center;
            text-decoration: none;
        }

        .logout-link {
            background: #5c667a;
        }

        .site-nav {
            position: fixed;
            top: 20px;
            left: 24px;
            display: flex;
            gap: 16px;
            font-size: 14px;
            font-weight: 700;
        }

        .site-nav a {
            color: #26324a;
            text-decoration: none;
        }

        @media (max-width: 760px) {
            .auth-page {
                grid-template-columns: 1fr;
            }

            .brand-area {
                min-height: 32vh;
                padding: 32px 24px;
            }

            .brand-logo {
                font-size: 48px;
            }

            .brand-subtitle {
                font-size: 19px;
            }

            .content-area {
                align-items: flex-start;
                border-left: 0;
                border-top: 1px solid #dde4ee;
            }
        }
    </style>
</head>
<body>
    <nav class="site-nav">
        <a th:href="@{/}">홈</a>
        <a th:if="${loginUserId == null}" th:href="@{/member/id-input}">아이디 입력</a>
        <a th:if="${loginUserId == null}" th:href="@{/member/signup}">회원가입</a>
        <a th:if="${loginUserId != null}" th:href="@{/member/logout}">로그아웃</a>
    </nav>

    <main class="auth-page">
        <section class="brand-area">
            <div>
                <p class="brand-logo">BookFrame</p>
                <p class="brand-subtitle">도서 구매 사이트</p>
            </div>
        </section>

        <section class="content-area">
            <div class="content-panel">
                <h1>마이페이지</h1>
                <div class="profile-box" th:if="${member}">
                    <p>아이디: <span th:text="${member.userId}"></span></p>
                    <p>이름: <span th:text="${member.name}"></span></p>
                    <p>이메일: <span th:text="${member.email}"></span></p>
                    <a class="button-link" th:href="@{/member/mypage/edit}">정보 수정</a>
                    <a class="button-link logout-link" th:href="@{/member/logout}">로그아웃</a>
                </div>
                <div class="profile-box" th:unless="${member}">
                    <p>사용자 정보를 찾을 수 없습니다.</p>
                    <a class="button-link" th:href="@{/member/id-input}">아이디 입력</a>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
