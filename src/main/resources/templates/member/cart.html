<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>&#51109;&#48148;&#44396;&#45768;</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, "Malgun Gothic", sans-serif;
            background: #f8fafc;
            color: #111827;
        }
        .site-nav {
            position: fixed;
            top: 28px;
            left: 36px;
            display: flex;
            gap: 28px;
            z-index: 10;
            font-size: 15px;
            font-weight: 700;
        }
        .site-nav a { color: #26324a; text-decoration: none; }
        .hero {
            padding: 28px 24px 24px;
            text-align: center;
            background: #ffffff;
            border-bottom: 1px solid #dde4ee;
        }
        .brand-logo {
            margin: 0;
            color: #26324a;
            font-size: 64px;
            font-weight: 900;
            letter-spacing: 0;
        }
        .brand-subtitle {
            margin: 12px 0 0;
            color: #5c667a;
            font-size: 24px;
            font-weight: 700;
        }
        .cart-page {
            max-width: 1180px;
            margin: 42px auto 80px;
            padding: 0 28px;
        }
        .page-title {
            margin: 0 0 26px 10px;
            font-size: 32px;
            font-weight: 900;
        }
        .cart-layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 330px;
            gap: 28px;
            align-items: start;
        }
        .cart-list,
        .summary-card {
            border: 1px solid #dde4ee;
            border-radius: 10px;
            background: #ffffff;
            box-shadow: 0 10px 24px rgba(38, 50, 74, 0.06);
        }
        .cart-list {
            padding: 24px 28px;
            min-height: 360px;
        }
        .cart-header,
        .cart-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 160px 160px 80px;
            gap: 20px;
            align-items: center;
        }
        .cart-header {
            padding: 4px 12px 20px;
            border-bottom: 1px solid #e5eaf2;
            font-weight: 800;
        }
        .cart-row {
            padding: 24px 12px;
            border-bottom: 1px solid #eef2f7;
        }
        .cart-row:last-child { border-bottom: 0; }
        .book-info {
            display: flex;
            gap: 22px;
            align-items: center;
            min-width: 0;
        }
        .book-cover {
            width: 88px;
            height: 128px;
            object-fit: contain;
            flex: 0 0 auto;
            background: #f1f5f9;
            border-radius: 4px;
        }
        .book-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 88px;
            height: 128px;
            flex: 0 0 auto;
            background: #eef2f7;
            color: #64748b;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 700;
        }
        .book-title {
            margin: 0;
            font-size: 18px;
            font-weight: 900;
            line-height: 1.4;
        }
        .price,
        .quantity {
            font-size: 18px;
            font-weight: 800;
        }
        .qty-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .qty-btn {
            width: 32px;
            height: 32px;
            border: 1px solid #dde4ee;
            border-radius: 6px;
            background: #f8fafc;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
        }
        .qty-btn:disabled {
            opacity: .35;
            cursor: default;
        }
        .delete-btn {
            padding: 6px 10px;
            border: 1px solid #fca5a5;
            border-radius: 6px;
            background: #fff1f2;
            color: #be123c;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }
        .summary-card {
            padding: 32px 24px;
        }
        .summary-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            font-size: 22px;
            font-weight: 900;
        }
        .summary-total {
            font-size: 26px;
        }
        .buy-button {
            width: 100%;
            height: 56px;
            border: 0;
            border-radius: 8px;
            background: #4f46e5;
            color: #ffffff;
            font-size: 18px;
            font-weight: 900;
            cursor: default;
        }
        .buy-button:not(:disabled) {
            cursor: pointer;
        }
        .buy-button:disabled {
            opacity: .55;
        }
        .cart-alert {
            margin: 0 0 18px;
            padding: 14px 18px;
            border-radius: 8px;
            font-weight: 800;
        }
        .cart-alert.success {
            background: #ecfdf5;
            color: #047857;
        }
        .cart-alert.error {
            background: #fff1f2;
            color: #be123c;
        }
        .empty-message {
            padding: 90px 20px;
            color: #64748b;
            font-size: 20px;
            font-weight: 800;
            text-align: center;
        }
        @media (max-width: 900px) {
            .brand-logo { font-size: 48px; }
            .cart-layout,
            .cart-header,
            .cart-row {
                grid-template-columns: 1fr;
            }
            .cart-header {
                display: none;
            }
        }
    </style>
</head>
<body>
<nav class="site-nav">
    <a th:href="@{/}">&#54856;</a>
    <a th:href="@{/member/mypage}">&#47560;&#51060;&#54168;&#51060;&#51648;</a>
</nav>

<header class="hero">
    <h1 class="brand-logo">BookFrame</h1>
    <p class="brand-subtitle">&#46020;&#49436; &#44396;&#47588; &#49324;&#51060;&#53944;</p>
</header>

<main class="cart-page">
    <h2 class="page-title">&#51109;&#48148;&#44396;&#45768;</h2>

    <div class="cart-alert success" th:if="${param.cartSuccess != null}">
        &#51109;&#48148;&#44396;&#45768; &#49345;&#54408; &#44396;&#47588;&#44032; &#50756;&#47308;&#46104;&#50632;&#49845;&#45768;&#45796;.
    </div>
    <div class="cart-alert error" th:if="${param.cartError != null}">
        &#51109;&#48148;&#44396;&#45768; &#44396;&#47588;&#47484; &#51652;&#54665;&#54624; &#49688; &#50630;&#49845;&#45768;&#45796;. &#51116;&#44256;&#47484; &#54869;&#51064;&#54644; &#51452;&#49464;&#50836;.
    </div>

    <div class="cart-layout">
        <section class="cart-list">
            <div class="empty-message" th:if="${#lists.isEmpty(cartItems)}">
                &#51109;&#48148;&#44396;&#45768;&#44032; &#48708;&#50612;&#51080;&#49845;&#45768;&#45796;.
            </div>

            <div th:unless="${#lists.isEmpty(cartItems)}">
                <div class="cart-header">
                    <span>&#49345;&#54408;</span>
                    <span>&#44032;&#44201;</span>
                    <span>&#49688;&#47049;</span>
                    <span></span>
                </div>

                <article class="cart-row" th:each="item : ${cartItems}">
                    <div class="book-info">
                        <img class="book-cover"
                             th:if="${item.imageUrl != null and item.imageUrl != ''}"
                             th:src="${item.imageUrl}"
                             th:alt="${item.bookName}">
                        <div class="book-placeholder" th:unless="${item.imageUrl != null and item.imageUrl != ''}">
                            No Image
                        </div>
                        <p class="book-title" th:text="${item.bookName}">&#52293; &#51228;&#47785;</p>
                    </div>
                    <div class="price" th:text="${#numbers.formatDecimal(item.unitPrice, 0, 'COMMA', 0, 'POINT')} + '&#50896;'">0&#50896;</div>
                    <div class="quantity">
                        <form th:action="@{/member/cart/update/{cartId}(cartId=${item.cartId})}" method="post">
                            <div class="qty-controls">
                                <button type="submit" name="quantity" th:value="${item.quantity - 1}"
                                        class="qty-btn" th:disabled="${item.quantity <= 1}">-</button>
                                <span th:text="${item.quantity}">1</span>
                                <button type="submit" name="quantity" th:value="${item.quantity + 1}"
                                        class="qty-btn">+</button>
                            </div>
                        </form>
                    </div>
                    <div>
                        <form th:action="@{/member/cart/delete/{cartId}(cartId=${item.cartId})}" method="post">
                            <button type="submit" class="delete-btn">&#49325;&#51228;</button>
                        </form>
                    </div>
                </article>
            </div>
        </section>

        <aside class="summary-card">
            <div class="summary-line">
                <span>&#52509; &#44552;&#50529;</span>
                <strong class="summary-total"
                        th:text="${#numbers.formatDecimal(cartTotal, 0, 'COMMA', 0, 'POINT')} + '&#50896;'">0&#50896;</strong>
            </div>
            <form th:action="@{/member/cart/purchase}" method="post">
                <button type="submit"
                        class="buy-button"
                        th:disabled="${#lists.isEmpty(cartItems)}">
                    &#44396;&#47588;&#54616;&#44592;
                </button>
            </form>
        </aside>
    </div>
</main>
</body>
</html>
