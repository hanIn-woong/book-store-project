<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{common/layout :: layout(~{::section})}">
<body>
<section>
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="h4 fw-bold mb-4">결제 수단 선택</h2>

                    <div class="mb-4">
                        <p class="mb-1 text-muted">도서</p>
                        <h3 class="h5 fw-bold" th:text="${book.name}">도서 제목</h3>
                        <p class="fs-5 fw-bold text-primary mb-0"
                           th:text="${#numbers.formatDecimal(book.unitPrice, 0, 'COMMA', 0, 'POINT')} + '원'">
                            0원
                        </p>
                    </div>

                    <p class="alert alert-danger" th:if="${error}" th:text="${error}"></p>

                    <div class="d-grid gap-2">
                        <form th:action="@{/member/purchase/{bookId}/complete(bookId=${book.bookId})}" method="post">
                            <input type="hidden" name="paymentMethod" value="CARD">
                            <button type="submit" class="btn btn-primary btn-lg w-100">카드 결제</button>
                        </form>

                        <form th:action="@{/member/purchase/{bookId}/complete(bookId=${book.bookId})}" method="post">
                            <input type="hidden" name="paymentMethod" value="BANK">
                            <button type="submit" class="btn btn-outline-primary btn-lg w-100">무통장 입금</button>
                        </form>

                        <a th:href="@{/books/{bookId}(bookId=${book.bookId})}" class="btn btn-outline-secondary btn-lg">
                            상세 페이지로 돌아가기
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
