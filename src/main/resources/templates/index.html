<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{common/layout :: layout(~{::section})}">
<body>
<section>
    <div class="p-5 mb-4 bg-light rounded-3 shadow-sm">
        <div class="container-fluid py-5">
            <h1 class="display-5 fw-bold">Book Store</h1>
            <p class="col-md-8 fs-4">
                원하는 도서를 둘러보고 회원으로 로그인해 더 편리하게 이용할 수 있는 도서 구매 서비스입니다.
            </p>
            <hr class="my-4">

            <div class="d-grid gap-2 d-md-flex justify-content-md-start" th:if="${loginUserId == null}">
                <a th:href="@{/member/id-input}" class="btn btn-primary btn-lg px-4 me-md-2">로그인</a>
                <a th:href="@{/member/signup}" class="btn btn-outline-secondary btn-lg px-4">회원가입</a>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-start"
                 th:if="${loginUserId != null and loginRole == 'USER'}">
                <!-- TODO: /books 목록 페이지 구현 후 정상 이동 확인 필요 -->
                <a th:href="@{/books}" class="btn btn-primary btn-lg px-4 me-md-2">도서 목록</a>
                <a th:href="@{/member/mypage}" class="btn btn-outline-secondary btn-lg px-4 me-md-2">마이페이지</a>
                <a th:href="@{/member/logout}" class="btn btn-outline-danger btn-lg px-4">로그아웃</a>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-start"
                 th:if="${loginUserId != null and loginRole == 'ADMIN'}">
                <a th:href="@{/admin}" class="btn btn-primary btn-lg px-4 me-md-2">관리자 페이지</a>
                <a th:href="@{/member/logout}" class="btn btn-outline-danger btn-lg px-4">로그아웃</a>
            </div>
        </div>
    </div>
</section>
</body>
</html>
