<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::section})}">
<body>
<section>

    <div class="mb-3">
        <a th:href="@{/books}" class="text-decoration-none text-muted">← 목록으로 돌아가기</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">

            <div class="d-flex align-items-center gap-2 mb-2">
                <h2 class="fw-bold mb-0" th:text="${book.name}">책 제목</h2>
                <!-- condition 배지 -->
                <span th:if="${book.condition != null}"
                      th:text="${book.condition}"
                      th:class="${book.condition == '신규'} ? 'badge bg-success' : (${book.condition == '중고'} ? 'badge bg-warning text-dark' : 'badge bg-secondary')">
                </span>
            </div>

            <p class="text-muted mb-4" th:text="${book.author} + ' 저 | ' + ${book.publisher}">저자 | 출판사</p>

            <hr>

            <div class="row mb-3">
                <div class="col-md-6">
                    <p><strong>카테고리</strong><br><span th:text="${book.category}">카테고리</span></p>
                    <p><strong>출간일</strong><br><span th:text="${book.releaseDate}">출간일</span></p>
                    <p><strong>도서 ID</strong><br><span th:text="${book.bookId}">P0000</span></p>
                    <p><strong>조회수</strong><br><span th:text="${book.viewCount} + '회'">0회</span></p>
                </div>
                <div class="col-md-6">
                    <p>
                        <strong>가격</strong><br>
                        <span class="fs-4 fw-bold text-primary" th:text="${book.unitPrice} + '원'">0원</span>
                    </p>
                    <p>
                        <strong>재고 상태</strong><br>
                        <span th:if="${book.unitsInStock > 0}" class="text-success fw-bold">
                            재고 있음 (<span th:text="${book.unitsInStock}">0</span>권)
                        </span>
                        <span th:if="${book.unitsInStock == 0}" class="text-danger fw-bold">품절</span>
                    </p>
                </div>
            </div>

            <hr>

            <div class="mb-4">
                <strong>책 소개</strong>
                <p class="mt-2" th:text="${book.description}">책 소개 내용</p>
            </div>

            <div class="mb-4">
                <strong>배송 안내</strong>
                <p class="mt-2 text-muted">주문 후 1~3일 이내 출고됩니다. (도서산간 지역 제외)</p>
            </div>

            <div class="d-flex gap-2">
                <button type="button" class="btn btn-outline-primary"
                        th:disabled="${book.unitsInStock == 0}">
                    장바구니 담기
                </button>
                <button type="button" class="btn btn-primary"
                        th:disabled="${book.unitsInStock == 0}">
                    <span th:if="${book.unitsInStock > 0}">구매하기</span>
                    <span th:if="${book.unitsInStock == 0}">품절</span>
                </button>
            </div>

        </div>
    </div>

</section>
</body>
</html>
