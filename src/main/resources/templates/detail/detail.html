<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${book.name}">도서 상세</title>
</head>
<body>

<h1 th:text="${book.name}">책 제목</h1>

<p>
    <strong>도서 ID:</strong>
    <span th:text="${book.bookId}">P0000</span>
</p>

<p>
    <strong>지은이:</strong>
    <span th:text="${book.author}">저자명</span>
</p>

<p>
    <strong>출판사:</strong>
    <span th:text="${book.publisher}">출판사</span>
</p>

<p>
    <strong>카테고리:</strong>
    <span th:text="${book.category}">카테고리</span>
</p>

<p>
    <strong>가격:</strong>
    <span th:text="${book.unitPrice} + '원'">0원</span>
</p>

<p>
    <strong>재고:</strong>
    <span th:text="${book.unitsInStock}">0</span>
</p>

<p>
    <strong>출간일:</strong>
    <span th:text="${book.releaseDate}">출간일</span>
</p>

<p>
    <strong>상태:</strong>
    <span th:text="${book.condition}">상태</span>
</p>

<p>
    <strong>책 소개:</strong>
</p>
<p th:text="${book.description}">
    책 소개 내용
</p>

<button type="button">장바구니 담기</button>
<button type="button">구매하기</button>

<br><br>

<a href="/">목록으로 돌아가기</a>

</body>
</html>
