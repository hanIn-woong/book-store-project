<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="bookCard(book)" class="card h-100 shadow-sm border-0">

    <div class="text-center pt-3" style="height: 220px; overflow: hidden;">
        <img th:if="${book.imageUrl != null and book.imageUrl != ''}"
             th:src="${book.imageUrl}"
             th:alt="${book.name}"
             class="h-100"
             style="object-fit: contain;">
        <div th:unless="${book.imageUrl != null and book.imageUrl != ''}"
             class="d-flex align-items-center justify-content-center h-100 bg-light text-muted">
            No Image
        </div>
    </div>

    <div class="card-body d-flex flex-column">
        <div class="d-flex flex-wrap gap-1 mb-2">
            <span class="badge bg-danger"
                  th:if="${book.releaseDate != null and book.releaseDate != '' and !T(java.time.LocalDate).parse(book.releaseDate).isBefore(T(java.time.LocalDate).now().minusMonths(1))}">NEW</span>
            <span class="badge"
                  th:classappend="${book.unitsInStock == 0} ? 'bg-danger' : (${book.unitsInStock <= 3} ? 'bg-warning text-dark' : 'bg-success')"
                  th:text="${book.unitsInStock == 0} ? '품절' : (${book.unitsInStock <= 3} ? '재고 임박' : '재고 있음')">재고 있음</span>
            <span class="badge bg-secondary"
                  th:if="${book.condition == '중고'}">중고</span>
        </div>

        <span class="badge bg-secondary mb-2 align-self-start"
              th:text="${book.category}">카테고리</span>

        <h6 class="card-title fw-bold mb-1"
            th:text="${book.name}"
            style="display: -webkit-box; -webkit-line-clamp: 2;
                   -webkit-box-orient: vertical; overflow: hidden;">도서명</h6>

        <p class="card-text text-muted small mb-2"
           th:text="${book.author}">저자</p>

        <p class="card-text fw-bold text-primary mt-auto mb-2"
           th:text="${#numbers.formatDecimal(book.unitPrice, 0, 'COMMA', 0, 'POINT')} + '원'">
            0원
        </p>

        <a th:href="@{/books/{id}(id=${book.bookId})}"
           class="btn btn-outline-dark btn-sm w-100">상세보기</a>
    </div>
</div>

</body>
</html>
