<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{common/layout :: layout(~{::section})}">
<body>
<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>도서 관리 목록</h2>
        <a th:href="@{/admin/add}" class="btn btn-primary">새 도서 등록</a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>도서ID</th>
                <th>이미지</th>
                <th>도서명</th>
                <th>가격</th>
                <th>저자</th>
                <th>출판사</th>
                <th>분류</th>
                <th>재고</th>
                <th>관리</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="book : ${books}">
                <td th:text="${book.bookId}">P1234</td>
                <td>
                    <img th:if="${book.imageUrl != null and book.imageUrl != ''}" th:src="${book.imageUrl}" alt="Book Image" style="width: 50px; height: auto;">
                    <span th:unless="${book.imageUrl != null and book.imageUrl != ''}" class="text-muted">No Image</span>
                </td>
                <td th:text="${book.name}">도서명</td>
                <td th:text="${#numbers.formatDecimal(book.unitPrice, 0, 'COMMA', 0, 'POINT')} + '원'">15,000원</td>
                <td th:text="${book.author}">저자</td>
                <td th:text="${book.publisher}">출판사</td>
                <td><span class="badge bg-info text-dark" th:text="${book.category}">고전</span></td>
                <td th:text="${book.unitsInStock}">100</td>
                <td>
                    <div class="btn-group btn-group-sm">
                        <a th:href="@{/admin/edit/{id}(id=${book.bookId})}" class="btn btn-outline-warning">수정</a>
                        <form th:action="@{/admin/delete/{id}(id=${book.bookId})}" method="post" style="display: inline;">
                            <button type="submit" class="btn btn-outline-danger" onclick="return confirm('정말 삭제하시겠습니까?')">삭제</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
