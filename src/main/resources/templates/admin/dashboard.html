<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{common/layout :: layout(~{::section})}">
<body>
<section>
    <div class="mb-4">
        <h2>관리자 대시보드</h2>
        <p class="text-muted">도서 판매 및 재고 현황 요약입니다.</p>
    </div>

    <!-- 상단 요약 카드 -->
    <div class="row g-4 mb-5">
        <div class="col-md-3">
            <div class="card bg-primary text-white h-100 shadow-sm">
                <div class="card-body">
                    <h6 class="card-title">총 도서 종수</h6>
                    <h2 class="display-6 mb-0" th:text="${totalBooks}">20</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-success text-white h-100 shadow-sm">
                <div class="card-body">
                    <h6 class="card-title">총 재고 수량</h6>
                    <h2 class="display-6 mb-0" th:text="${#numbers.formatDecimal(totalStock, 0, 'COMMA', 0, 'POINT')}">3,450</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-warning text-dark h-100 shadow-sm">
                <div class="card-body">
                    <h6 class="card-title">재고 부족 (3권 이하)</h6>
                    <h2 class="display-6 mb-0" th:text="${lowStockBooks.size()}">1</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card h-100 shadow-sm" th:classappend="${outOfStockCount > 0} ? 'bg-danger text-white' : 'bg-info text-white'">
                <div class="card-body">
                    <h6 class="card-title">품절 도서 수</h6>
                    <h2 class="display-6 mb-0" th:text="${outOfStockCount}">0</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <!-- 베스트셀러 순위 -->
        <div class="col-lg-8">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0">판매 TOP 5 (베스트셀러)</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4">순위</th>
                                    <th>도서명</th>
                                    <th>판매량</th>
                                    <th>가격</th>
                                    <th class="pe-4">재고</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="book, iterStat : ${bestSellers}">
                                    <td class="ps-4">
                                        <span class="badge" th:classappend="${iterStat.index < 3} ? 'bg-primary' : 'bg-secondary'" th:text="${iterStat.count}">1</span>
                                    </td>
                                    <td>
                                        <div class="d-flex align-items-center">
                                            <img th:src="${book.imageUrl}" style="width: 30px; margin-right: 10px;" alt="">
                                            <span th:text="${book.name}" class="fw-bold">책 제목</span>
                                        </div>
                                    </td>
                                    <td th:text="${book.salesCount} + '권'">120권</td>
                                    <td th:text="${#numbers.formatDecimal(book.unitPrice, 0, 'COMMA', 0, 'POINT')} + '원'">15,000원</td>
                                    <td class="pe-4">
                                        <span th:text="${book.unitsInStock}" th:class="${book.unitsInStock < 10} ? 'text-danger fw-bold' : ''">100</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="card-footer bg-white text-end">
                    <a th:href="@{/admin/books}" class="btn btn-link btn-sm">전체 도서 관리 →</a>
                </div>
            </div>
        </div>

        <!-- 카테고리별 분포 및 재고 부족 목록 -->
        <div class="col-lg-4">
            <!-- 재고 부족 위험 알림 -->
            <div class="card shadow-sm mb-4 border-danger">
                <div class="card-header bg-danger text-white py-3">
                    <h5 class="mb-0">재고 부족 경고</h5>
                </div>
                <div class="card-body">
                    <div th:if="${#lists.isEmpty(lowStockBooks)}" class="text-center py-3">
                        <p class="text-muted mb-0">재고가 부족한 도서가 없습니다.</p>
                    </div>
                    <ul th:unless="${#lists.isEmpty(lowStockBooks)}" class="list-group list-group-flush">
                        <li th:each="book : ${lowStockBooks}" class="list-group-item d-flex justify-content-between align-items-center px-0">
                            <div class="text-truncate" style="max-width: 200px;">
                                <small class="text-muted" th:text="${book.bookId}">P1234</small><br>
                                <span th:text="${book.name}">책 제목</span>
                            </div>
                            <span class="badge bg-danger rounded-pill" th:text="${book.unitsInStock} + '권'">5권</span>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- 카테고리 분포 요약 -->
            <div class="card shadow-sm">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0">카테고리별 도서 수</h5>
                </div>
                <div class="card-body">
                    <div th:each="entry : ${categoryStats}" class="mb-3">
                        <div class="d-flex justify-content-between mb-1">
                            <span th:text="${entry.key}">고전</span>
                            <span class="fw-bold" th:text="${entry.value} + '종'">3종</span>
                        </div>
                        <div class="progress" style="height: 8px;">
                            <div class="progress-bar bg-info" role="progressbar" 
                                 th:style="'width: ' + (${entry.value} * 100 / ${totalBooks}) + '%'"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
