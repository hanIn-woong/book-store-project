<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
<header th:fragment="header">
    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">BookFrame</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <!-- 
                    관리자 역할(role) 필드 추가 후 활성화 예정
                    <th:block th:if="${loginMember != null and loginMember.role == 'ADMIN'}">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/admin/books}">도서 관리</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/admin/add}">도서 등록</a>
                        </li>
                    </th:block>
                    -->
                    <!-- 임시: 관리자 메뉴 항상 노출 (Member role 필드 추가 전까지) -->
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/books}">도서 관리</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/add}">도서 등록</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <th:block th:if="${loginUserId == null}">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/member/login}">로그인</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/member/signup}">회원가입</a>
                        </li>
                    </th:block>
                    <th:block th:if="${loginUserId != null}">
                        <li class="nav-item">
                            <span class="nav-link" th:text="${loginUserId} + '님 환영합니다'">사용자님 환영합니다</span>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/member/mypage}">마이페이지</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/member/logout}">로그아웃</a>
                        </li>
                    </th:block>
                </ul>
            </div>
        </div>
    </nav>
</header>
</body>
</html>
