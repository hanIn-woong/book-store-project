<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Store - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 70px; }
        .navbar {
            background-color: #ffffff !important;
            border-bottom: 1px solid #dde4ee;
        }
        .navbar-brand {
            font-weight: 800;
            color: #26324a !important;
            font-size: 1.5rem;
            letter-spacing: -1px;
        }
        .nav-link {
            color: #5c667a !important;
            font-weight: 600;
        }
        .nav-link:hover {
            color: #26324a !important;
        }
        .footer { padding: 2rem 0; margin-top: 4rem; border-top: 1px solid #e5e5e5; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light fixed-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">BookFrame</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/books}">도서 관리</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/add}">도서 등록</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <th:block th:if="${loginUserId == null}">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/member/login}">로그인</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/member/signup}">회원가입</a>
                    </li>
                </th:block>
                <th:block th:if="${loginUserId != null}">
                    <li class="nav-item">
                        <span class="nav-link" th:text="${loginUserId} + '님 환영합니다'">사용자님 환영합니다</span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/member/mypage}">마이페이지</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/member/logout}">로그아웃</a>
                    </li>
                </th:block>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div th:replace="${content}"></div>
</div>

<footer class="footer bg-light text-center">
    <div class="container">
        <span class="text-muted">&copy; 2026 Book Store Project. Admin Role Implementation.</span>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
